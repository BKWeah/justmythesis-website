      <stop offset="0%" style="stop-color:#18452F"/>
      <stop offset="100%" style="stop-color:#1D5036"/>
    </linearGradient>
  </defs>
  <!-- JUSTmyTHESIS wordmark -->
  <text x="0" y="50" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#18452F">JUST</text>
